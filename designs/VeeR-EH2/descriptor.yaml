configurations:
  default:
    verilogIncludeFiles:
      - src/default/common_defines.vh
      - src/default/eh2_param.vh
      - src/default/eh2_pdef.vh
      - src/default/pic_map_auto.h
  hiperf:
    verilogIncludeFiles:
      - src/hiperf/common_defines.vh
      - src/hiperf/eh2_param.vh
      - src/hiperf/eh2_pdef.vh
      - src/hiperf/pic_map_auto.h
  asic:
    verilogIncludeFiles:
      - src/asic/common_defines.vh
      - src/asic/eh2_param.vh
      - src/asic/eh2_pdef.vh
      - src/asic/pic_map_auto.h

tests:
  hello:
    executeInputFiles:
      tests/hello.hex: program.hex
  cmark:
    executeInputFiles:
      tests/cmark.hex: program.hex
    executeArgs:
      - +iterations=4
  cmark_mt:
    executeInputFiles:
      tests/cmark_mt.hex: program.hex
    executeArgs:
      - +iterations=4
  cmark_iccm:
    executeInputFiles:
      tests/cmark_iccm.hex: program.hex
    executeArgs:
      - +iterations=9
  cmark_iccm_mt:
    executeInputFiles:
      tests/cmark_iccm_mt.hex: program.hex
    executeArgs:
      - +iterations=6
  dhry:
    executeInputFiles:
      tests/dhry.hex: program.hex
    executeArgs:
      - +iterations=7800
  dhry_mt:
